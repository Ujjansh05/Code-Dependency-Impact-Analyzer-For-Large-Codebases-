version: "3.8"

services:
  # ── TigerGraph ──────────────────────────────────────────────
  tigergraph:
    image: docker.io/tigergraph/tigergraph:3.9.3
    container_name: tigergraph
    ports:
      - "9000:9000"     # REST API
      - "14240:14240"   # GraphStudio UI
    env_file:
      - ./config/tigergraph.env
    volumes:
      - tg_data:/home/tigergraph/tigergraph/data
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/echo"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - ./config/tigergraph.env
      - ./config/llama.env
    volumes:
      - ./data:/app/data
      - ./parser:/app/parser
      - ./graph:/app/graph
      - ./llm:/app/llm
      - ./backend:/app/backend
    depends_on:
      tigergraph:
        condition: service_healthy
    restart: on-failure

  # ── Ollama (LLaMA) ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  tg_data:
  ollama_data:
